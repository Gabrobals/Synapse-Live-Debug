    "UP011", "UP012", "UP015", "UP018", "UP030", "UP031",
    "UP032", "UP034", "UP035", "UP036", "UP037", "UP039",
    # Ruff-specific (RUF)
    "RUF005", "RUF006", "RUF010", "RUF013", "RUF015", "RUF016", "RUF100",
]

ignore = [
    "E501",
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
