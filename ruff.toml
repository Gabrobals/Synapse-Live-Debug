    "F401", "F402", "F403", "F405",
    "F501", "F502", "F504", "F505",
    "F521", "F522", "F523", "F524", "F525",
    "F601", "F811", "F821", "F841", "F842", "F901",
    # pycodestyle Errors (E)
    "E101", "E111", "E112", "E113", "E114", "E115", "E116", "E117",
    "E201", "E202", "E211",
    "E221", "E222", "E225", "E226", "E231", "E241",
    "E251", "E252", "E261", "E262", "E265", "E266",
    "E271", "E272", "E275",
    "E301", "E302", "E303", "E304",
    "E711", "E712", "E721", "E722", "E731", "E741",
    # pycodestyle Warnings (W)
    "W191", "W291", "W292", "W293",
    # isort (I)
    "I001",
    # Bugbear (B) — real bug patterns
    "B002", "B003", "B004", "B005", "B006", "B007", "B008",
    "B009", "B010", "B011", "B015", "B016", "B017", "B018",
    "B020", "B023", "B025", "B029", "B032", "B033", "B904",
