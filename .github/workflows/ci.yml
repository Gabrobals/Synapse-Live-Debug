name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      - name: Check syntax
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/debug_store.py
          python -m py_compile backend/file_watcher.py
          
      - name: Run backend smoke test
        run: |
          cd backend
          timeout 5 python main.py &
          sleep 3
          curl -f http://localhost:8421/health || exit 1
